server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /var/www/exsinov;
    index index.html;

    # ── React SPA: qualquer rota cai no index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache longo para assets com hash (Vite gera hashes automáticos) ──
    location ~* \.(js|css|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 6M;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Security headers ──
    add_header X-Frame-Options          "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header X-XSS-Protection         "1; mode=block"                   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_min_length 1000;

    # ── Logs ──
    access_log /var/log/nginx/exsinov.access.log;
    error_log  /var/log/nginx/exsinov.error.log warn;
}
